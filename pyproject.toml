# Tooling config only — Recall ships no installable package and has no runtime
# dependencies (numpy is an optional accelerator, never required).

[tool.ruff]
line-length = 100
target-version = "py39"
extend-exclude = ["claude-code-context-plugin.md"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.coverage.run]
source = ["scripts"]
branch = true

[tool.coverage.report]
show_missing = true
# session_start is a thin lifecycle entry point exercised only inside a live
# Claude Code session, so it can't be meaningfully unit-tested here.
omit = ["scripts/session_start.py"]

[tool.bandit]
# Reviewed and accepted, with justification:
#  B404/B603/B607 — the only subprocesses are git and the opencode CLI. Both
#    are invoked with a static argv list (never shell=True) and found on PATH
#    by name; git is additionally hardened against untrusted-repo config (see
#    scripts/common.py:git_info, scripts/harness_opencode.py:_run_opencode).
#  B110 — the lifecycle hooks deliberately `except Exception: pass` so a failure
#    in Recall can never crash a Claude Code session. This is a hard design
#    requirement (see CONTRIBUTING.md), used only in hook entry points.
skips = ["B404", "B603", "B607", "B110"]
