name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate plugin + config JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                   hooks/hooks.json recall.config.json; do
            python3 -c "import json,sys; json.load(open('$f')); print('ok', '$f')"
          done
      - name: Opencode installer smoke test (generated files are valid)
        # The unit suite covers installer logic; this guards the shipped
        # templates end-to-end — placeholder substitution, a syntactically
        # valid shim (node parses the generated .ts as ESM), parseable
        # generated opencode.json, and a clean uninstall.
        run: |
          proj="$(mktemp -d)"
          python3 scripts/install.py --opencode --project "$proj"
          python3 - "$proj" <<'EOF'
          import json, sys
          cfg = json.load(open(sys.argv[1] + "/opencode.json"))
          assert ".recall/context.md" in cfg.get("instructions", []), cfg
          print("ok generated opencode.json")
          EOF
          grep -q "Generated by Recall" "$proj/.opencode/plugins/recall.ts"
          ! grep -q "__RECALL_SCRIPTS__" "$proj/.opencode/plugins/recall.ts"
          cp "$proj/.opencode/plugins/recall.ts" /tmp/recall-shim.mjs
          node --check /tmp/recall-shim.mjs && echo "ok shim syntax"
          python3 scripts/install.py --opencode --uninstall --project "$proj"
          test ! -e "$proj/.opencode/plugins/recall.ts"
          test ! -e "$proj/.opencode/commands/recall-save.md"

  lint:
    name: Lint & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade ruff bandit
      - name: Ruff
        run: ruff check scripts tests benchmarks
      - name: Bandit (Python SAST)
        run: bandit -c pyproject.toml -r scripts

  test:
    name: Tests (py${{ matrix.python-version }} / ${{ matrix.numpy }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        numpy: ["with-numpy", "no-numpy"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pytest pytest-cov
      - name: Install numpy (accelerated summarizer path)
        if: matrix.numpy == 'with-numpy'
        run: python -m pip install numpy
      - name: Run tests
        run: pytest --cov --cov-report=xml
      - name: Upload coverage to Codecov
        # One representative cell is enough; uploading every matrix combination
        # just adds duplicate reports for the same line coverage.
        if: matrix.python-version == '3.12' && matrix.numpy == 'with-numpy'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    name: Benchmark gate (${{ matrix.numpy }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        numpy: ["with-numpy", "no-numpy"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install numpy (accelerated summarizer path)
        if: matrix.numpy == 'with-numpy'
        run: python -m pip install numpy
      - name: Benchmark report (informational)
        run: python benchmarks/bench.py
      - name: Quality gate (summarizer beats baselines, backends agree, redaction precision)
        run: python benchmarks/bench.py --check

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gitleaks lists PR commits via the API on pull_request events
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
